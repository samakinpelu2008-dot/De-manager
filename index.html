<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLUWAKEMI LENS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{background:linear-gradient(135deg,#f9f4ef,#ffe3c5);}

/* HEADER */
header{
position:fixed; top:0; width:100%;
background:linear-gradient(90deg,#ffd966,#fbb03b);
display:flex; justify-content:space-between; align-items:center;
padding:18px 40px; box-shadow:0 4px 20px rgba(0,0,0,0.2);
border-bottom-left-radius:20px; border-bottom-right-radius:20px; z-index:1002;
}
.logo{font-size:28px; font-weight:bold; color:white; letter-spacing:1px;}
.menu-btn{font-size:28px; cursor:pointer; color:white; z-index:1004;}

/* MENU & OVERLAY */
.menu{
position:fixed; top:0; left:-280px; width:280px; height:100%; background:white;
padding-top:100px; transition:0.4s; box-shadow:4px 0 20px rgba(0,0,0,0.1);
border-radius:0 20px 20px 0; z-index:1003;
}
.menu a{display:block; padding:18px 30px; text-decoration:none; color:#222; font-size:18px;}
.menu a:hover{background:linear-gradient(90deg,#ffd966,#fbb03b); color:white;}
.overlay{position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5); display:none; z-index:1002;}

/* HERO SLIDER */
.hero-card-wrapper{position:relative; max-width:900px; margin:140px auto 20px auto; height:450px;}
.hero-glow{position:absolute; top:0; left:0; width:100%; height:100%; border-radius:25px;
background:radial-gradient(circle, rgba(255,223,102,0.4), transparent 70%);
z-index:0; filter:blur(40px); animation:glowPulse 5s infinite alternate;}
@keyframes glowPulse{0%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.1);opacity:0.6;}100%{transform:scale(1);opacity:0.4;}}
.hero-card{border-radius:25px; overflow:hidden; box-shadow:0 12px 35px rgba(0,0,0,0.3);
position:relative; background:linear-gradient(135deg,#ffecd2,#fcb69f); height:450px; z-index:1;}
.hero-card img{width:100%; height:450px; object-fit:cover; position:absolute;
opacity:0; transition:1s; border-radius:25px; transform:scale(1.05);}
.hero-card img.active{opacity:1;}
.hero-text{position:absolute; bottom:40px; left:40px; color:white; max-width:450px; text-shadow:2px 2px 15px rgba(0,0,0,0.7);}
.hero-text h1{font-size:42px; margin-bottom:12px; font-family:serif;}
.hero-text p{margin-bottom:18px; font-size:20px;}
.hero-text button{padding:14px 30px; border:none; background:linear-gradient(90deg,#ffd966,#fbb03b);
color:white; border-radius:15px; cursor:pointer; font-weight:bold; transition:0.3s;}
.hero-text button:hover{transform:scale(1.05);}

/* CATEGORY CARDS */
.categories{display:flex; justify-content:center; gap:20px; margin:20px 0;}
.category{padding:12px 25px; background:white; border-radius:20px; box-shadow:0 4px 15px rgba(0,0,0,0.15);
cursor:pointer; transition:0.3s; font-weight:bold;}
.category.active{background:linear-gradient(90deg,#ffd966,#fbb03b); color:white;}

/* SEARCH BAR */
.search-bar{max-width:900px; margin:0 auto 40px auto; display:flex; justify-content:center;}
.search-bar input{width:100%; max-width:600px; padding:12px 18px; border-radius:20px; border:2px solid #ffd966; font-size:16px;}

/* PRODUCTS GRID */
.products{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:25px; max-width:1000px; margin:0 auto 60px auto;}
.card{background:white; border-radius:25px; overflow:hidden; box-shadow:0 8px 25px rgba(0,0,0,0.15);
transition:0.5s, box-shadow 0.5s; border:2px solid transparent; animation:float 4s ease-in-out infinite;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-6px);}100%{transform:translateY(0);}}
.card:hover{transform:translateY(-12px); box-shadow:0 16px 35px rgba(0,0,0,0.3); border:2px solid #ffd966;}
.card img{width:100%; height:220px; object-fit:cover; transition:0.4s;}
.card:hover img{transform:scale(1.05);}
.card-info{padding:15px;}
.card-info h3{margin-bottom:8px; color:#222;}
.card-info .price{color:#555; font-weight:bold;}
.card-info button{padding:8px 18px; border:none; background:linear-gradient(90deg,#ffd966,#fbb03b);
color:white; border-radius:12px; cursor:pointer; font-weight:bold; transition:0.3s;}
.card-info button:hover{transform:scale(1.05);}

/* FOOTER */
footer{background:linear-gradient(135deg,#ffd966,#fbb03b); color:#222; padding:30px 40px; text-align:center;
border-top-left-radius:20px; border-top-right-radius:20px; font-weight:bold;}
footer p{margin:10px 0; font-size:16px;}

/* MEDIA */
@media(max-width:768px){.hero-text{left:20px;} header{padding:15px 20px;} .categories{flex-direction:column; align-items:center;}}
</style>
</head>
<body>

<header>
<div class="menu-btn" onclick="openMenu()"><i class="fas fa-bars"></i></div>
<div class="logo">OLUWAKEMI LENS</div>
</header>

<div class="menu" id="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Products</a>
<a href="#">Custom Lenses</a>
<a href="#">Reviews</a>
<a href="#">Contact</a>
</div>
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HERO SLIDER -->
<div class="hero-card-wrapper">
<div class="hero-glow"></div>
<div class="hero-card" id="heroCard">
  <img class="active" src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde">
  <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
  <img src="https://images.unsplash.com/photo-1501368618237-9ca8a372fdbd">
  <img src="https://images.unsplash.com/photo-1519852476561-12b54c04685c">
  <img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
  <img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8">
  <img src="https://images.unsplash.com/photo-1520975911923-2964b4aadc16">
  <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
  <img src="https://images.unsplash.com/photo-1526170375885-3a6a9f7431b6">
  <img src="https://images.unsplash.com/photo-1532438909335-d7d9fda222d6">
  <div class="hero-text">
    <h1>OLUWAKEMI LENS</h1>
    <p>Premium Eyewear & Custom Lenses</p>
    <button>Shop Now</button>
  </div>
</div>
</div>

<!-- CATEGORY CARDS -->
<div class="categories">
<div class="category active" data-category="fashion">Fashion</div>
<div class="category" data-category="frames">Frames</div>
<div class="category" data-category="cases">Cases</div>
</div>

<!-- SEARCH BAR -->
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search products...">
</div>

<!-- PRODUCTS GRID -->
<div class="products" id="productsGrid">
  <!-- Products will be injected by JS -->
</div>

<!-- FOOTER -->
<footer>
<p>© 2026 OLUWAKEMI LENS. All rights reserved.</p>
</footer>

<script>
// MENU
function openMenu(){document.getElementById("menu").style.left="0"; document.getElementById("overlay").style.display="block";}
function closeMenu(){document.getElementById("menu").style.left="-280px"; document.getElementById("overlay").style.display="none";}

// HERO SLIDER
let slides=document.querySelectorAll(".hero-card img"), index=0;
setInterval(()=>{
slides[index].classList.remove("active");
index++;
if(index>=slides.length) index=0;
slides[index].classList.add("active");
},3500);

// PRODUCTS DATA
const products = [
{category:'fashion', name:'Classic Aviator', price:'$50', img:'https://images.unsplash.com/photo-1585386959984-a41552231658'},
{category:'fashion', name:'Luxury Round', price:'$75', img:'https://images.unsplash.com/photo-1572635196237-14b3f281503f'},
{category:'fashion', name:'Modern Cat-Eye', price:'$60', img:'https://images.unsplash.com/photo-1545156521-8506d19a2e6d'},
{category:'fashion', name:'Custom Lens Elite', price:'$80', img:'https://images.unsplash.com/photo-1585387140434-7a0b5a63032e'},
{category:'frames', name:'Sport Frames', price:'$55', img:'https://images.unsplash.com/photo-1540657398919-a8db3f08470c'},
{category:'frames', name:'Vintage Square', price:'$70', img:'https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b'},
{category:'frames', name:'Urban Slim', price:'$65', img:'https://images.unsplash.com/photo-1491528323818-fdd1faba62cc'},
{category:'cases', name:'Leather Case', price:'$25', img:'https://images.unsplash.com/photo-1505751172876-fa1923c5c528'},
{category:'cases', name:'Hard Shell Case', price:'$30', img:'https://images.unsplash.com/photo-1526170375885-3a6a9f7431b6'},
{category:'cases', name:'Premium Pouch', price:'$28', img:'https://images.unsplash.com/photo-1532438909335-d7d9fda222d6'}
];

// FUNCTIONS
const productsGrid = document.getElementById('productsGrid');
let activeCategory = 'fashion';
function renderProducts(){
  productsGrid.innerHTML = '';
  const search = document.getElementById('searchInput').value.toLowerCase();
  products.filter(p=>p.category===activeCategory && p.name.toLowerCase().includes(search))
  .forEach(p=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML=`<img src="${p.img}"><div class="card-info"><h3>${p.name}</h3><p class="price">${p.price}</p><button>Add to Cart</button></div>`;
    productsGrid.appendChild(card);
  });
}

// CATEGORY CLICK
document.querySelectorAll('.category').forEach(cat=>{
  cat.addEventListener('click',()=>{
    document.querySelectorAll('.category').forEach(c=>c.classList.remove('active'));
    cat.classList.add('active');
    activeCategory = cat.dataset.category;
    renderProducts();
  });
});

// SEARCH
document.getElementById('searchInput').addEventListener('input',renderProducts);

// INITIAL RENDER
renderProducts();
</script>

</body>
</html>
